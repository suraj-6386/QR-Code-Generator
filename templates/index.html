<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Professional QR Creator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">QR Gen</a>
            <button id="theme-toggle" aria-label="Toggle Theme">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <div class="main-content">
            <div class="left-panel">
                <div class="generator-card">
                    <h2>Create Your QR Code</h2>
                    
                    <div class="form-group">
                        <label for="text-input">Text or URL</label>
                        <textarea id="text-input" placeholder="Enter URL or text here..." rows="4"></textarea>
                    </div>

                    <div class="section-title">Customization</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="qr-color">QR Color</label>
                            <input type="color" id="qr-color" value="#000000">
                        </div>
                        <div class="form-group">
                            <label for="bg-color">BG Color</label>
                            <input type="color" id="bg-color" value="#FFFFFF">
                        </div>
                    </div>

                    <div class="section-title">Advanced Options</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="error-correction">Error Correction</label>
                            <select id="error-correction">
                                <option value="L">Low (7%)</option>
                                <option value="M" selected>Medium (15%)</option>
                                <option value="Q">Quartile (25%)</option>
                                <option value="H">High (30%)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="box-size">Box Size</label>
                            <input type="range" id="box-size" min="5" max="20" value="10">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="border">Border Size</label>
                        <input type="range" id="border" min="0" max="10" value="4">
                    </div>

                    <div class="button-group">
                        <button class="btn-primary" id="generate-btn">Generate QR Code</button>
                        <button class="btn-secondary" id="reset-btn">Reset</button>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="preview-card">
                    <div class="preview-label">Preview</div>
                    <div id="preview-container">
                        <p>Your QR code will appear here</p>
                    </div>
                    <div id="download-section" style="display: none; margin-top: 2rem;">
                        <button class="btn-primary" id="download-btn">Download PNG</button>
                    </div>
                </div>

                <div class="features-card">
                    <h3>Features</h3>
                    <ul>
                        <li>✓ High-speed generation</li>
                        <li>✓ Custom colors & sizes</li>
                        <li>✓ Error correction levels</li>
                        <li>✓ Professional aesthetics</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <a href="/policy">Privacy & Terms</a>
            <a href="/contact">Contact</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
