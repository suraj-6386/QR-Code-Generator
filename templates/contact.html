<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Suraj Gupta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">QR Gen</a>
            <button id="theme-toggle" aria-label="Toggle Theme">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="contact-page">
        <div class="contact-card premium">
            <div class="card-accent"></div>
            <div class="card-header">
                <h1>Suraj Gupta</h1>
                <p class="title-tag">MCA Candidate</p>
            </div>
            
            <div class="card-content">
                <div class="contact-methods">
                    <div class="method-item">
                        <span class="icon">✉️</span>
                        <div class="details">
                            <label>Reach out via Email</label>
                            <a href="mailto:surajgupta.mca@example.com" class="value">surajgupta.mca@example.com</a>
                        </div>
                    </div>
                </div>

                <div class="brand-footer">
                    <div class="location">
                        <span class="icon">📍</span>
                        <span>Pimpri, Pune</span>
                    </div>
                    <div class="institution">
                        <p>Affiliated with Dr. D. Y. Patil Vidyapeeth</p>
                    </div>
                </div>
            </div>
            
            <div class="card-decoration">
                <span>Custom Portal v1.0</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <a href="/policy">Privacy & Terms</a>
            <a href="/contact">Contact</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
